{{define "workspace"}}
<section id="workspace" class="space-y-4">
  {{template "goal" .Goal}}

  <form id="tactic-form" class="flex gap-2" hx-post="/tactics/run" hx-target="#workspace" hx-swap="outerHTML">
    <input type="hidden" name="session_id" value="{{.SessionId}}">
    <input type="hidden" name="document_id" value="{{.DocumentId}}">
    <input type="hidden" name="document_version" value="{{.DocumentVersion}}">
    <input type="hidden" name="state_id" value="{{.StateId}}">
    <input type="hidden" name="goal_id" value="{{.GoalId}}">
    <input name="tactic" value="{{.TacticInput}}" class="min-w-0 flex-1 border px-2 py-1 font-mono text-sm">
    <button type="submit" class="border px-3 py-1">Run</button>
  </form>

  {{template "messages" .Messages}}
  {{template "lsp_panels" .Lsp}}
  <form id="verify-form" hx-post="/verify" hx-target="#verify" hx-swap="outerHTML">
    <input type="hidden" name="session_id" value="{{.SessionId}}">
    <input type="hidden" name="document_id" value="{{.DocumentId}}">
    <input type="hidden" name="document_version" value="{{.DocumentVersion}}">
    <input type="hidden" name="state_id" value="{{.StateId}}">
    <button type="submit" class="border px-3 py-1">Verify</button>
  </form>
  {{template "verify" .Verify}}
</section>
{{end}}
